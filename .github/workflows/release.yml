name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/coda

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../coda-${{ github.ref_name }}-${{ matrix.target }}.tar.gz coda
          cd ../../../
          shasum -a 256 coda-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > coda-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: coda-${{ matrix.target }}
          path: |
            coda-*.tar.gz
            coda-*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            coda-*.tar.gz
            coda-*.sha256

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Read SHA256 values
        id: sha
        run: |
          ARM64_SHA=$(cat coda-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          X86_64_SHA=$(cat coda-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')
          echo "arm64=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_64=$X86_64_SHA" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: LarryLuTW/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ github.ref_name }}"
          cat > homebrew-tap/Formula/coda.rb << 'FORMULA'
          class Coda < Formula
            desc "Restart Spotify when ads play — macOS daemon"
            homepage "https://github.com/LarryLuTW/coda"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_arm do
              url "https://github.com/LarryLuTW/coda/releases/download/VERSION_PLACEHOLDER/coda-VERSION_PLACEHOLDER-aarch64-apple-darwin.tar.gz"
              sha256 "ARM64_SHA_PLACEHOLDER"
            end

            on_intel do
              url "https://github.com/LarryLuTW/coda/releases/download/VERSION_PLACEHOLDER/coda-VERSION_PLACEHOLDER-x86_64-apple-darwin.tar.gz"
              sha256 "X86_64_SHA_PLACEHOLDER"
            end

            def install
              bin.install "coda"
            end

            test do
              assert_match "coda", shell_output("#{bin}/coda --version")
            end
          end
          FORMULA
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" homebrew-tap/Formula/coda.rb
          sed -i "s/ARM64_SHA_PLACEHOLDER/${{ steps.sha.outputs.arm64 }}/g" homebrew-tap/Formula/coda.rb
          sed -i "s/X86_64_SHA_PLACEHOLDER/${{ steps.sha.outputs.x86_64 }}/g" homebrew-tap/Formula/coda.rb

      - name: Push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/coda.rb
          git commit -m "coda ${{ github.ref_name }}"
          git push
